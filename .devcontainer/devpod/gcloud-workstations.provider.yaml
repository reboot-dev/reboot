# Patched copy of the DevPod gcloud provider (v0.0.12). It differs from
# upstream in two places, both marked `PATCHED` below: `agent.exec.shutdown`
# and the bottom `exec` block (`start`/`stop`/`status`). Together they make
# an idle timeout or `devpod stop` SUSPEND the VM and `devpod up` RESUME it,
# instead of terminating and cold-starting, so terminals and in-flight work
# survive. When bumping the provider version, re-sync this file from the
# upstream release and re-apply those changes:
#   https://github.com/loft-sh/devpod-provider-gcloud/releases
name: gcloud
version: v0.0.12
description: |-
  DevPod on Google Cloud
icon: https://devpod.sh/assets/gcp.svg
optionGroups:
  - options:
      - DISK_SIZE
      - DISK_IMAGE
      - MACHINE_TYPE
    name: "GCloud options"
  - options:
      - AGENT_PATH
      - INACTIVITY_TIMEOUT
      - INJECT_DOCKER_CREDENTIALS
      - INJECT_GIT_CREDENTIALS
    name: "Agent options"
options:
  PROJECT:
    description: The project id to use.
    required: true
    command: gcloud config list --quiet --verbosity=error --format "value(core.project)" 2>/dev/null || true
  ZONE:
    description: The google cloud zone to create the VM in. E.g. europe-west1-d
    required: true
    command: |-
      GCLOUD_ZONE=$(gcloud config list --quiet --verbosity=error --format "value(compute.zone)" 2>/dev/null || true)
      if [ -z "$GCLOUD_ZONE" ]; then
        echo "europe-west2-b"
      else
        echo $GCLOUD_ZONE
      fi
    suggestions:
      - asia-east1-a
      - asia-east1-b
      - asia-east1-c
      - asia-east2-a
      - asia-east2-b
      - asia-east2-c
      - asia-northeast1-a
      - asia-northeast1-c
      - asia-northeast2-b
      - asia-northeast3-b
      - asia-south1-a
      - asia-south1-b
      - asia-southeast1-a
      - europe-north1-a
      - europe-north1-b
      - europe-north1-c
      - europe-west1-b
      - europe-west1-c
      - europe-west1-d
      - europe-west2-a
      - europe-west2-b
      - europe-west2-c
      - europe-west3-a
      - europe-west3-b
      - europe-west3-c
      - europe-west4-a
      - europe-west4-b
      - europe-west4-c
      - europe-west9-a
      - europe-west9-b
      - europe-west9-c
      - me-central1-a
      - me-central1-b
      - me-central1-c
      - me-west1-a
      - me-west1-b
      - me-west1-c
      - northamerica-northeast1-a
      - northamerica-northeast1-b
      - northamerica-northeast1-c
      - southamerica-east1-a
      - southamerica-east1-b
      - southamerica-east1-c
      - southamerica-west1-a
      - southamerica-west1-b
      - southamerica-west1-c
      - us-central1-a
      - us-central1-b
      - us-central1-f
      - us-east1-b
      - us-east1-c
      - us-east1-d
      - us-east4-a
      - us-east4-b
      - us-east4-c
      - us-south1-a
      - us-south1-b
      - us-south1-c
      - us-west1-a
      - us-west1-b
      - us-west1-c
      - us-west2-a
      - us-west2-b
      - us-west2-c
      - us-west4-a
      - us-west4-b
      - us-west4-c
  NETWORK:
    description: The network id to use.
  SUBNETWORK:
    description: The subnetwork id to use.
  TAG:
    description: A tag to attach to the instance.
    default: "devpod"
  DISK_SIZE:
    description: The disk size to use (GB).
    default: "40"
  DISK_IMAGE:
    description: The disk image to use.
    default: projects/cos-cloud/global/images/cos-101-17162-127-5
  SERVICE_ACCOUNT:
    description: A service account to attach
    default: ""
  PUBLIC_IP_ENABLED:
    description: Use a public ip to access the instance
    default: "true"
  MACHINE_TYPE:
    description: The machine type to use.
    default: c2-standard-4
    suggestions:
      - f1-micro
      - e2-small
      - e2-medium
      - n2-standard-2
      - n2-standard-4
      - n2-standard-8
      - n2-standard-16
      - n2-highcpu-8
      - n2-highcpu-16
      - c2-standard-4
      - c2-standard-8
      - c2-standard-16
      - c2-standard-30
      - g2-standard-4
      - g2-standard-8
      - g2-standard-12
      - g2-standard-16
      - a2-highgpu-1g
      - a2-highgpu-2g
  INACTIVITY_TIMEOUT:
    description: If defined, will automatically stop the VM after the inactivity period.
    default: 5m
  INJECT_GIT_CREDENTIALS:
    description: "If DevPod should inject git credentials into the remote host."
    default: "true"
  INJECT_DOCKER_CREDENTIALS:
    description: "If DevPod should inject docker credentials into the remote host."
    default: "true"
  AGENT_PATH:
    description: The path where to inject the DevPod agent to.
    default: /var/lib/toolbox/devpod
  GCLOUD_PROVIDER_TOKEN:
    local: true
    hidden: true
    cache: 5m
    description: "The Google Cloud auth token to use"
    command: |-
      ${GCLOUD_PROVIDER} token
agent:
  path: ${AGENT_PATH}
  inactivityTimeout: ${INACTIVITY_TIMEOUT}
  injectGitCredentials: ${INJECT_GIT_CREDENTIALS}
  injectDockerCredentials: ${INJECT_DOCKER_CREDENTIALS}
  binaries:
    GCLOUD_PROVIDER:
      - os: linux
        arch: amd64
        path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-linux-amd64
        checksum: ebc38f3ce8f74f1ea4d79f7ff7de2c6fafb7cceb252422b106013c5ceca402bd
      - os: linux
        arch: arm64
        path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-linux-arm64
        checksum: b333374e0f97c514e4ce7c3433a7f1fd6aa46922ca18856d470203145ffc2f0f
  exec:
    # PATCHED. On the inactivity timeout we SUSPEND the VM (saving its
    # RAM and process state to disk) instead of terminating it, so open
    # terminals and in-flight work survive until the next `devpod up`.
    # GCE suspend is API-only, so we call the suspend REST API,
    # authenticating with the instance's OWN attached service-account
    # token from the metadata server. We avoid using the `up`-time token,
    # which may have expired. The daemon runs as root so no sudo is needed.
    # The VM's service account must have `compute.instances.suspend`
    # permissions.
    shutdown: |-
      meta="http://metadata.google.internal/computeMetadata/v1"
      flavor="Metadata-Flavor: Google"
      name=$(curl -s -H "$flavor" "$meta/instance/name")
      zone=$(curl -s -H "$flavor" "$meta/instance/zone" | sed 's@.*/@@')
      project=$(curl -s -H "$flavor" "$meta/project/project-id")
      token=$(curl -s -H "$flavor" \
        "$meta/instance/service-accounts/default/token" \
        | python3 -c 'import sys,json; print(json.load(sys.stdin)["access_token"])')
      curl -s -X POST -H "Authorization: Bearer $token" \
        "https://compute.googleapis.com/compute/v1/projects/$project/zones/$zone/instances/$name/suspend"
binaries:
  GCLOUD_PROVIDER:
    - os: linux
      arch: amd64
      path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-linux-amd64
      checksum: ebc38f3ce8f74f1ea4d79f7ff7de2c6fafb7cceb252422b106013c5ceca402bd
    - os: linux
      arch: arm64
      path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-linux-arm64
      checksum: b333374e0f97c514e4ce7c3433a7f1fd6aa46922ca18856d470203145ffc2f0f
    - os: darwin
      arch: amd64
      path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-darwin-amd64
      checksum: 37e7a73ebb1be6961695320d54fcb142c021774ff7f5b339a2dec5bbbc317e54
    - os: darwin
      arch: arm64
      path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-darwin-arm64
      checksum: 0eb3862c7e5a07a71a6decfe499320664a57925dda2817d1c4a59e4d598f4f82
    - os: windows
      arch: amd64
      path: https://github.com/loft-sh/devpod-provider-gcloud/releases/download/v0.0.12/devpod-provider-gcloud-windows-amd64.exe
      checksum: c5140711e5a5bac0219a9efd35c8690eb0fbfdc7b6f28e2afe2c05ebf0a17eaa
exec:
  init: ${GCLOUD_PROVIDER} init
  command: ${GCLOUD_PROVIDER} command
  create: ${GCLOUD_PROVIDER} create
  delete: ${GCLOUD_PROVIDER} delete
  # PATCHED start/stop/status to use GCE suspend/resume rather than
  # stop/start, so the VM keeps its RAM and running processes across
  # idle periods: `devpod stop` suspends and `devpod up` resumes. The
  # stock gcloud binary has no resume and aborts its `status` with
  # "unexpected status: SUSPENDED", so we special-case that state. These
  # run client-side, where `gcloud` is already a dependency (see the
  # PROJECT/ZONE option commands above).
  start: |-
    if ${GCLOUD_PROVIDER} status 2>&1 | grep -q SUSPENDED; then
      gcloud compute instances resume "devpod-${MACHINE_ID}" \
        --zone "${ZONE}" --project "${PROJECT}"
    else
      ${GCLOUD_PROVIDER} start
    fi
  stop: |-
    gcloud compute instances suspend "devpod-${MACHINE_ID}" \
      --zone "${ZONE}" --project "${PROJECT}"
  status: |-
    out=$(${GCLOUD_PROVIDER} status 2>&1)
    rc=$?
    if [ "$rc" -eq 0 ]; then
      printf '%s\n' "$out"
    elif printf '%s' "$out" | grep -q SUSPENDED; then
      echo "Stopped"
    else
      printf '%s\n' "$out" >&2
      exit "$rc"
    fi
