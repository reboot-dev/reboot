// The blob data-plane interface.
//
// A `BlobDataPlane` holds blob *bytes*; all blob *metadata* lives in
// the `Blob` control-plane state machine (see `blobs.proto`). The
// control plane never touches bytes: it calls this service to
// provision uploads, finalize them, mint download URLs, and delete
// objects, and the bytes themselves travel directly between the client
// and wherever the data plane keeps them (a presigned-URL store like
// S3, or — for a data plane whose `Configuration` asks for forwarded
// paths — the application's own HTTP routes proxying to it).
//
// This is a plain gRPC service, deliberately free of any Reboot
// framework options, so that it can be implemented by anything and
// addressed by a bare URL (`REBOOT_BLOB_DATA_PLANE_URL`). The
// open-source filesystem server implements it; Reboot Cloud implements
// it privately (S3, and eventually a CDN) in each app's facilitator.
//
// The control plane retries `BeginUpload`, `CompleteUpload`, and
// `Delete` inside workflows, so every method must be *safe* to call
// more than once for the same `blob_id`. `CompleteUpload` and `Delete`
// are naturally idempotent (a completed blob returns its ETag;
// deleting an absent blob succeeds). `BeginUpload` should reuse an
// existing uncommitted session where it can; a backend that can only
// mint fresh upload ids is still acceptable — a lost response then
// orphans a session, which is reclaimed when the blob expires
// uncommitted or is deleted.

syntax = "proto3";

package rbt.std.blobs.v1;

service BlobDataPlane {
  // Reports what the control plane needs to know to talk to this data
  // plane: the client part size, and which paths (if any) the
  // application must forward to it. Read once at application startup.
  rpc Configuration(ConfigurationRequest) returns (ConfigurationResponse);

  // Provisions an upload session for a blob and returns its data-plane
  // upload id (e.g. an S3 multipart upload id). Should reuse an
  // existing uncommitted session for the same blob; a fresh session is
  // acceptable (see the idempotency note above).
  rpc BeginUpload(DataPlaneBeginUploadRequest)
      returns (DataPlaneBeginUploadResponse);

  // Mints URLs to which the client `PUT`s each requested part's bytes
  // directly. A URL is either absolute (e.g. a presigned S3 URL,
  // directly reachable by the client) or application-relative, under a
  // path the data plane's `Configuration` asked to have forwarded.
  rpc UploadInstructions(DataPlaneUploadInstructionsRequest)
      returns (DataPlaneUploadInstructionsResponse);

  // Finalizes the object from its uploaded parts, validating the
  // reported ETags/sizes against the real bytes and enforcing
  // `max_size` against the real total. Returns the composite ETag, or
  // a permanent-failure `error` (ETag mismatch, over `max_size`, ...)
  // that the control plane surfaces so the client can re-upload. A
  // *transient* failure is a gRPC error instead, so the control-plane
  // workflow retries. Idempotent: completing an already-completed blob
  // returns its ETag.
  rpc CompleteUpload(DataPlaneCompleteUploadRequest)
      returns (DataPlaneCompleteUploadResponse);

  // Mints a URL from which the committed object's bytes can be
  // downloaded: absolute (e.g. a presigned S3/CloudFront URL) or
  // application-relative under a forwarded path, like
  // `UploadInstructions` URLs. Minted afresh per request so that
  // swapping the data-plane implementation takes effect immediately.
  rpc GetDownloadUrl(DataPlaneGetDownloadUrlRequest)
      returns (DataPlaneGetDownloadUrlResponse);

  // Removes the object's bytes and any incomplete upload session.
  // Idempotent: deleting an absent blob succeeds.
  rpc Delete(DataPlaneDeleteRequest) returns (DataPlaneDeleteResponse);
}

message ConfigurationRequest {}

// The HTTP method of a forwarded path.
enum HttpMethod {
  HTTP_METHOD_UNSPECIFIED = 0;
  HTTP_METHOD_GET = 1;
  HTTP_METHOD_PUT = 2;
}

// One path namespace the application must forward to the data plane:
// requests with the given method whose path starts with `path_prefix`
// are reverse-proxied to the data plane's HTTP endpoint verbatim
// (path and query). `path_prefix` must be under `/__/reboot/blob/` —
// the application refuses anything else, so a data plane can never
// claim application routes.
message ForwardedPath {
  HttpMethod method = 1;
  string path_prefix = 2;
}

message ConfigurationResponse {
  // The part size clients must use; every part but the last must be
  // exactly this size.
  uint64 part_size = 1;

  // Paths the application must forward to this data plane. Empty when
  // the data plane's URLs are directly reachable by clients (e.g.
  // presigned S3 or CloudFront URLs) and no forwarding is needed.
  repeated ForwardedPath forwarded_paths = 2;

  // The port of this data plane's HTTP byte endpoint, to which
  // forwarded requests are proxied. The host is the one the
  // application already reaches this gRPC service on (so the data
  // plane need not know how it is addressed externally), and the
  // scheme follows that connection's transport security. Only
  // meaningful when `forwarded_paths` is non-empty.
  uint32 http_port = 3;
}

////////////////////////////////////////////////////////////////////////

message DataPlaneBeginUploadRequest {
  string blob_id = 1;
  string content_type = 2;
}

message DataPlaneBeginUploadResponse {
  string upload_id = 1;
}

////////////////////////////////////////////////////////////////////////

message DataPlaneUploadInstructionsRequest {
  string blob_id = 1;
  string upload_id = 2;
  repeated uint32 part_numbers = 3;
}

message DataPlanePartUploadInstruction {
  uint32 part_number = 1;
  string url = 2;
}

message DataPlaneUploadInstructionsResponse {
  repeated DataPlanePartUploadInstruction instructions = 1;
}

////////////////////////////////////////////////////////////////////////

message DataPlaneUploadedPart {
  uint32 number = 1;
  string etag = 2;
  uint64 size = 3;
}

message DataPlaneCompleteUploadRequest {
  string blob_id = 1;
  string upload_id = 2;
  string content_type = 3;
  repeated DataPlaneUploadedPart parts = 4;
  optional uint64 max_size = 5;
}

message DataPlaneCompleteUploadResponse {
  // The committed object's composite ETag. Empty when `error` is set.
  string etag = 1;

  // A permanent-failure reason, if completion failed in a way the
  // client can fix by re-uploading. When set, `etag` is empty and the
  // control plane reverts the blob to UPLOADING with this message.
  optional string error = 2;
}

////////////////////////////////////////////////////////////////////////

message DataPlaneGetDownloadUrlRequest {
  string blob_id = 1;
  optional uint64 ttl_seconds = 2;
}

message DataPlaneGetDownloadUrlResponse {
  string url = 1;
}

////////////////////////////////////////////////////////////////////////

message DataPlaneDeleteRequest {
  string blob_id = 1;
}

message DataPlaneDeleteResponse {}
