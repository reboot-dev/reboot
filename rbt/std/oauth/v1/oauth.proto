syntax = "proto3";

package rbt.std.oauth.v1;

import "rbt/v1alpha1/options.proto";

////////////////////////////////////////////////////////////////////////
// OAuthTokens: an external identity provider's OAuth tokens, captured
// during the code exchange so the application can later call the
// provider's API on the user's behalf. Stored encrypted (serialized into
// a `Ciphertext`), never at rest in the clear.

message OAuthTokens {
  // The provider's access token (a bearer token for the provider's API).
  string access_token = 1;

  // The provider's refresh token, if one was issued. Unset (`HasField`
  // false) when the provider returned none.
  optional string refresh_token = 2;

  // Absolute expiry of `access_token` as epoch seconds. Unset if the
  // provider didn't tell us.
  optional int64 expires_at = 3;

  // The scopes the provider actually granted.
  repeated string scopes = 4;
}

////////////////////////////////////////////////////////////////////////
// OAuthTokenManager: stores the OAuth tokens for one external third-party
// service (e.g. Google, GitHub), keyed by `user_id`. Addressed by a state
// id naming that service (use the `GOOGLE` / `GITHUB` constants, or any
// string for a service without a predefined one). Each manager encrypts
// under its own dedicated `KeyManager`, so every key for a service can be
// shredded together; each user's tokens are scoped to their `user_id`, so
// a single user's tokens can be crypto-shredded.
//
// The state itself is intentionally empty: the `user_id -> Ciphertext id`
// pointers live in a per-manager `OrderedMap` derived from the manager's
// state id (just as `KeyManager` keeps its registry in a derived map).

message OAuthTokenManager {
  option (rbt.v1alpha1.state) = {
  };
}

////////////////////////////////////////////////////////////////////////

message StoreRequest {
  // The user whose tokens these are.
  string user_id = 1;

  // The provider tokens to encrypt and store. If `refresh_token` is unset
  // but one was previously stored for this user, the existing refresh
  // token is carried forward (some providers issue a refresh token only on
  // the first consent).
  OAuthTokens tokens = 2;
}

message StoreResponse {}

////////////////////////////////////////////////////////////////////////

message FetchRequest {
  // The user whose tokens to read.
  string user_id = 1;
}

message FetchResponse {
  // Whether tokens are stored (and still recoverable) for the user.
  bool found = 1;

  // The stored tokens; meaningful only when `found` is true.
  OAuthTokens tokens = 2;
}

////////////////////////////////////////////////////////////////////////

service OAuthTokenManagerMethods {
  // Encrypts and persists `tokens` for `user_id`, replacing any previously
  // stored tokens. Implicitly constructs the manager on first use.
  rpc Store(StoreRequest) returns (StoreResponse) {
    option (rbt.v1alpha1.method) = {
      transaction: {},
    };
  }

  // Returns the stored tokens for `user_id`, with `found` indicating
  // whether any are recoverable (false once a user's tokens have been
  // crypto-shredded).
  rpc Fetch(FetchRequest) returns (FetchResponse) {
    option (rbt.v1alpha1.method) = {
      reader: {},
    };
  }
}

////////////////////////////////////////////////////////////////////////
