////////////////////////////////////////////////////////////////////////

message Cancelled {}

////////////////////////////////////////////////////////////////////////

message Unknown {}

////////////////////////////////////////////////////////////////////////

message InvalidArgument {}

////////////////////////////////////////////////////////////////////////

message DeadlineExceeded {}

////////////////////////////////////////////////////////////////////////

message NotFound {}

////////////////////////////////////////////////////////////////////////

message AlreadyExists {}

////////////////////////////////////////////////////////////////////////

message PermissionDenied {}

////////////////////////////////////////////////////////////////////////

message ResourceExhausted {}

////////////////////////////////////////////////////////////////////////

message FailedPrecondition {}

////////////////////////////////////////////////////////////////////////

message Aborted {}

////////////////////////////////////////////////////////////////////////

message OutOfRange {}

////////////////////////////////////////////////////////////////////////

message Unimplemented {}

////////////////////////////////////////////////////////////////////////

message Internal {}

////////////////////////////////////////////////////////////////////////

message Unavailable {}

////////////////////////////////////////////////////////////////////////

message DataLoss {}

////////////////////////////////////////////////////////////////////////

message Unauthenticated {
  string message = 1;
}

////////////////////////////////////////////////////////////////////////

message Ok {}

