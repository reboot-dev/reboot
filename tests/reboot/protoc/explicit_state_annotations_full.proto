syntax = "proto3";

import "rbt/v1alpha1/options.proto";
import "tests/reboot/protoc/shared.proto";

package tests.reboot.protoc;

message Echo {
  option (rbt.v1alpha1.state) = {
    // TESTS: explicitly specifying the default value for `implements` is fine.
    // TESTS: a full name, including package, is acceptable.
    implements: [ "tests.reboot.protoc.EchoMethods" ]
  };
  Text last_message = 1;
}

service EchoMethods {
  option (rbt.v1alpha1.service) = {
    // TESTS: explicitly specifying the default value for `state` is fine.
    // TESTS: a full name, including package, is acceptable.
    state: "tests.reboot.protoc.Echo"
  };

  rpc Reply(Text) returns (Text) {
    option (rbt.v1alpha1.method).writer = {
    };
  }

  rpc LastMessage(Empty) returns (Text) {
    option (rbt.v1alpha1.method).reader = {
    };
  }
}
