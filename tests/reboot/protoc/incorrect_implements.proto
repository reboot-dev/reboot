syntax = "proto3";

import "rbt/v1alpha1/options.proto";
import "tests/reboot/protoc/shared.proto";

package tests.reboot.protoc;

message Echo {
  option (rbt.v1alpha1.state) = {
    // TESTS: specifying a nonexistent service to implement results in an error.
    implements: [ "NonExistentMethods" ]
  };
  Text last_message = 1;
}
