syntax = "proto3";

import "rbt/v1alpha1/options.proto";
import "tests/reboot/server/echo_shared_messages.proto";

package tests.reboot.server.service_descriptor_validator_proto_other;

// Copy of "original" proto definition, but in a different package.
message Echo {
  option (rbt.v1alpha1.state) = {
  };
  repeated string messages = 1;
}

service EchoMethods {
  rpc Reply(SingleStringField) returns (SingleStringField) {
    option (rbt.v1alpha1.method) = {
      writer: {},
    };
  }

  rpc Replay(EmptyMessage) returns (RepeatedStringField) {
    option (rbt.v1alpha1.method) = {
      reader: {},
    };
  }
}
