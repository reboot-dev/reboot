name: Build and Test

on:
  # We don't run CI on our `main` branch, only on pull requests to the
  # `main` branch. The `main` branch can only change via pull requests,
  # and checks on those pull requests must pass before merging to
  # `main`, so checks on `main` are redundant.
  #
  # We use `pull_request_target` rather than `pull_request` so that CI
  # can reach the Bazel remote cache secrets even on pull requests from
  # forks (`pull_request` withholds secrets from fork runs, and without
  # the cache our jobs cannot run). The workflow definition itself comes
  # from the base branch, but the jobs below check out and run the PR's
  # own code, so a fork PR executes untrusted code with our secrets. The
  # `approve-fork-pr` job holds every such run for maintainer approval
  # before any of that code runs; see its comment for the full model.
  pull_request_target:
    # Run CI on pull requests. Passing checks will be required to merge.
    branches:
      - "**"
  merge_group:
    # Required if we want to use GitHub's Merge Queue feature. See:
    #   https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/configuring-pull-request-merges/managing-a-merge-queue#triggering-merge-group-checks-with-github-actions

concurrency:
  # Have at most one of these workflows running per branch, cancelling older
  # runs that haven't completed yet when they become obsolete.
  #
  # When pushing new commits to a PR, each one of those commits triggers a new
  # workflow run that would normally run to completion, even when subsequent
  # pushes to the PR make their result obsolete. This consumes resources for no
  # benefit. We override that default behavior to save resources, cancelling any
  # older still-running workflows when a new workflow starts.
  #
  # See documentation about the `github` context variables here:
  #   https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
  #
  # We key the group on the PR number, not `github.ref`: under
  # `pull_request_target` `github.ref` is the base branch (e.g.
  # `refs/heads/main`) and so is identical for every PR, which would
  # collapse all PRs into one group. `merge_group` runs have no PR
  # number, so they fall back to `github.ref` (the unique merge-queue
  # ref).
  group: >-
    ${{ github.workflow }}-${{
    github.event.pull_request.number || github.ref }}
  # Cancel superseded runs for a PR when it gets new commits, but let
  # every `merge_group` run finish so each queued commit is tested.
  cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}

jobs:
  # External fork pull requests run with `pull_request_target`, which
  # grants our secrets and a read/write token even though the PR's own
  # (untrusted) code is what gets built and tested by the jobs below.
  # Hold every such run here until a maintainer has read the PR and
  # approved the `fork-pr-ci` environment. Same-repo pull requests (from
  # people who already have write access) and `merge_group` runs are
  # already trusted, so this job is skipped and CI proceeds with no
  # approval step. Every downstream job `needs` this one, so nothing
  # checks out or runs PR code before the approval clears.
  #
  # SETUP REQUIRED: the `fork-pr-ci` environment must exist in the
  # repository settings with "Required reviewers" configured. Without
  # that protection rule this job passes immediately and provides no
  # checkpoint at all.
  approve-fork-pr:
    name: Approve fork PR CI
    if: >-
      ${{ github.event_name == 'pull_request_target' &&
          github.event.pull_request.head.repo.full_name != github.repository }}
    runs-on: ubuntu-latest
    environment: fork-pr-ci
    steps:
      - name: Await maintainer approval
        run: echo "A maintainer approved running CI for this fork PR."

  check-code-style:
    name: Check Code Style
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/devcontainer.yml
    # The nested job needs write permissions, which means this job also needs
    # them.
    permissions:
      packages: write
    secrets: inherit
    with:
      cancel-workflow-on-failure: true
      runs-on: 4_core_GitHub_hosted
      run: |
        # Run check code style from dev-tools on all of our files using our
        # codespace image. This ensures that the version of code checking tools
        # match the versions that we currently use in our code spaces.
        # If the code check fails, error handling and cancellation will be taken
        # care of by the workflow in `devcontainer.yml`.
        ./submodules/dev-tools/check-style.sh --full

  build-reboot-linux-x86_x64-public:
    name: Build public repo for Linux x86_64
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/devcontainer.yml
    # The nested job needs write permissions, which means this job also needs
    # them.
    permissions:
      packages: write
    secrets: inherit
    with:
      cancel-workflow-on-failure: false
      runs-on: depot-ubuntu-24.04-32
      run: |
        # Fail if any part of this workflow fails.
        set -eux

        # First do a build to catch any "obvious" mistakes quickly; this
        # must be a separate step from the test run to also cover targets
        # that don't have test coverage.
        bazel build //...
        bazel test \
          --test_tag_filters=-requires-docker,-flaky,-manual \
          //tests/...

  test-react-native-maestro:
    name: Test React Native mobile app (Maestro)
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/devcontainer.yml
    permissions:
      packages: write
    secrets: inherit
    with:
      cancel-workflow-on-failure: false
      # The Maestro end-to-end test boots a hardware-accelerated
      # Android emulator, which requires `/dev/kvm`. Our Depot runners
      # don't expose KVM, so this one job runs on a GitHub-hosted runner
      # (which does); the rest of CI stays on Depot. The devcontainer
      # already maps `/dev/kvm` into the container (see the `runArgs` in
      # `.devcontainer/devcontainer.json`). We use the larger runner
      # because building the workstation image plus running the emulator
      # exhausts the disk on a standard GitHub-hosted runner.
      runs-on: 16_core_GitHub_hosted
      # On failure, upload Maestro's debug output (per-step screenshots +
      # the view hierarchy, which Maestro writes to `~/.maestro/tests/`)
      # and the backend/emulator/Expo logs, so a flaky flow can be
      # diagnosed from the run without reproducing it locally.
      artifact-name: maestro-debug
      artifact-path: maestro-artifacts
      run: |
        set -eux
        # Repo root inside the container; it's bind-mounted from the
        # runner, so artifacts we drop here are visible to the upload
        # step that runs back on the runner.
        workspace="$(pwd)"
        # The targets are tagged `manual`, so name them explicitly
        # rather than relying on a wildcard expansion to pick them up.
        # Capture the status so we can still collect artifacts on failure.
        returncode=0
        bazel test --test_output=streamed \
          //tests/reboot/examples/chat-room:maestro_test \
          //tests/reboot/examples/bank-pydantic:maestro_test || returncode=$?
        if [ "${returncode}" -ne 0 ]; then
          destination="${workspace}/maestro-artifacts"
          mkdir -p "${destination}"
          # The backend/emulator/Expo logs upload as-is.
          cp /tmp/rbt.log /tmp/emulator.log /tmp/expo.log "${destination}/" \
            2> /dev/null || true
          # Maestro names its per-step screenshots with a `?`, which
          # `upload-artifact` rejects, so archive its debug output rather
          # than copying it raw (the `?` is fine inside a tarball).
          tar czf "${destination}/maestro-debug.tar.gz" -C "${HOME}" \
            .maestro/tests 2> /dev/null || true
        fi
        exit "${returncode}"

  build-reboot-linux-arm64:
    name: Build public repo for Linux arm64
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/devcontainer.yml
    permissions:
      packages: write
    secrets: inherit
    with:
      cancel-workflow-on-failure: false
      arch: arm64
      runs-on: depot-ubuntu-24.04-arm-16
      run: |
        # Fail if any part of this workflow fails.
        set -eux

        # We do not install 'Pulumi' on the arm64 runners, so skip a couple
        # of tests, which use it.
        # The 'io_bazel_rules_webtesting' doesn't support Linux arm64 yet,
        # so skip those tests too.
        # https://github.com/bazelbuild/rules_webtesting/blob/master/common/conditions/BUILD.bazel
        #

        # 1) Build up the base query.
        QUERY='tests(//tests/...)'

        # 2) Exclude these tags by default for arm64.
        QUERY="$QUERY \
        except attr(\"tags\",\"requires-pulumi\",//tests/...) \
        except attr(\"tags\",\"requires-linux-x86\",//tests/...) \
        except attr(\"tags\",\"requires-macos\",//tests/...) \
        except attr(\"tags\",\"manual\",//tests/...)"

        # 3) If this is a PR labelled "reboot-release", also drop flaky
        # tests.
        if [ "$EXCLUDE_FLAKY" = "true" ]; then
          echo "NOTE: reboot-release label found — excluding flaky tests"
          QUERY="$QUERY except attr(\"tags\",\"flaky\",//tests/...)"
        fi

        # 4) Build test targets first so that test execution
        # doesn't compete with compilation for I/O.
        echo "▶ bazel query: $QUERY"
        TARGETS=$(bazel query "$QUERY")
        echo "$TARGETS" | xargs bazel build

        # 5) Run tests; all build artifacts are cached so
        # this only executes tests.
        echo "$TARGETS" | xargs bazel test

  build-reboot-documentation:
    name: Build Reboot documentation
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Under `pull_request_target`, checkout defaults to the base
          # branch; check out the PR head so CI tests the proposed
          # code. On non-PR events (e.g. `merge_group`) there is no
          # `pull_request`, so `ref` falls back to `github.sha`, the
          # queued merge commit. `allow-unsafe-pr-checkout` is required
          # now that `actions/checkout` refuses fork PR heads by
          # default; it is safe because the run first waits for
          # maintainer approval via the `fork-pr-ci` environment.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          allow-unsafe-pr-checkout: true
          show-progress: false
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Docusaurus >= 3.9 requires Node >= 20. Pinned to match
          # the Bazel toolchain (`node_version` in WORKSPACE.bazel).
          node-version: "20.19.0"
      - name: Install dependencies
        working-directory: ./documentation
        run: npm install
      - name: Build with Docusaurus
        working-directory: ./documentation
        run: npm run build

  test-manylinux-x86_64:
    name: Test Manylinux x86_64
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/manylinux.yml
    secrets: inherit
    with:
      cancel-workflow-on-failure: false
      arch: amd64
      runs-on: depot-ubuntu-24.04-32
      container-type: runner
      run: |
        # Run a representative test to verify the manylinux-built wheel
        # works.
        bazel test tests/reboot/examples/chat-room:release_test

  test-manylinux-arm64:
    name: Test Manylinux arm64
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/manylinux.yml
    secrets: inherit
    with:
      cancel-workflow-on-failure: false
      arch: arm64
      runs-on: depot-ubuntu-24.04-arm-16
      container-type: runner
      run: |
        # Run a representative test to verify the manylinux-built wheel
        # works.
        bazel test tests/reboot/examples/chat-room:release_test

  build-reboot-MacOS-arm64:
    name: Build public repo for MacOS arm64
    # Runs only after `approve-fork-pr` clears (or is skipped for a
    # trusted run); see that job.
    needs: approve-fork-pr
    if: >-
      ${{ !cancelled() &&
          (needs.approve-fork-pr.result == 'success' ||
           needs.approve-fork-pr.result == 'skipped') }}
    uses: ./.github/workflows/reboot_macos_environment.yml
    secrets: inherit
    with:
      runs-on: depot-macos-15
      # TODO: Make "LocalEnvoy" tests work on MacOS.
      # See https://github.com/reboot-dev/mono/issues/2345
      run: |
        # Fail if any part of this workflow fails.
        set -eux

        # 1) Build up the base query.
        QUERY='tests(//tests/...)'

        # 2) Exclude these tags by default for MacOS.
        QUERY="$QUERY \
        except attr(\"tags\",\"requires-docker\",//tests/...) \
        except attr(\"tags\",\"macos_not_supported\",//tests/...) \
        except attr(\"tags\",\"requires-linux-x86\",//tests/...) \
        except attr(\"tags\",\"manual\",//tests/...)"

        # 3) If this is a PR labelled "reboot-release", also drop flaky
        # tests.
        if [ "$GITHUB_EVENT_NAME" = "pull_request_target" ] && \
          jq -r '.pull_request.labels[].name' "$GITHUB_EVENT_PATH" \
            | grep -qx reboot-release; then
          echo "NOTE: reboot-release label found — excluding flaky tests"
          QUERY="$QUERY except attr(\"tags\",\"flaky\",//tests/...)"
        fi

        # 4) Build test targets first so that test execution
        # doesn't compete with compilation for I/O.
        echo "▶ bazel query: $QUERY"
        TARGETS=$(bazel query "$QUERY")
        echo "$TARGETS" | xargs bazel build

        # 5) Run tests; all build artifacts are cached so
        # this only executes tests.
        echo "$TARGETS" | xargs bazel test
