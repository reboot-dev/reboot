[project]
name = "chick-potle"
version = "0.1.0"
requires-python = ">= 3.10"
dependencies = [
    "httpx>=0.27,<1.0",
    "uuid7>=0.1.0",
    "anyio>=4.0.0",
    "reboot==1.1.0",
]

# `uv` reads dev dependencies from here (PEP 735) and installs them
# by default on `uv sync`, so `uv run pytest` works. The `[tool.rye]`
# block below mirrors these for the rye-based test harness.
[dependency-groups]
dev = [
    "pytest>=7.4",
]

[tool.rye]
dev-dependencies = [
    "pytest>=7.4",
    "reboot==1.1.0",
]

# This project only uses `rye` to provide `python` and its dependencies.
virtual = true
managed = true
