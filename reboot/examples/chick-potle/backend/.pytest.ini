[pytest]
# `ai_chat_food.v1` is a namespace package split across the
# top-level `api/` directory (Pydantic API definitions) and
# `backend/api/` (generated Reboot bindings), so both must be
# on `sys.path`. `src/` carries `main.py` and the `servicers/`
# package. Paths are relative to this file's directory.
pythonpath=
  src/
  ../api/
  api/
# Tests end in `_test.py` to match the convention used by
# sibling Reboot examples (`*_test.py` is one of pytest's
# default discovery patterns alongside `test_*.py`).
python_files=*_test.py
