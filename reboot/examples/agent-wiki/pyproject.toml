[project]
name = "agent-wiki"
version = "0.1.0"
requires-python = ">= 3.10"
dependencies = [
    "httpx>=0.27,<1.0",
    "uuid7>=0.1.0",
    "anyio>=4.0.0",
    "reboot>=0.46.0",
    "pydantic-ai-slim[anthropic]>=1.0.0",
]

[dependency-groups]
dev = ["pytest>=7.4"]

[tool.pytest.ini_options]
# Reproduce the backend's `sys.path`:
#   - `backend/src/`  — `main.py` and `servicers/`.
#   - `backend/api/`  — generated Reboot bindings (e.g.,
#                       `agent_wiki.v1.wiki_rbt`).
#   - `api/`          — Pydantic API definition module
#                       (`agent_wiki.v1.wiki`).
# `agent_wiki.v1` is a namespace package split across the last
# two paths, so both are required.
pythonpath = ["backend/src", "backend/api", "api"]
testpaths = ["backend/tests"]
# Tests end in `_test.py` to match the convention used by
# sibling Reboot examples.
python_files = ["*_test.py"]
