[project]
name = "mcp-counter"
version = "0.1.0"
requires-python = ">= 3.10"
dependencies = [
    "httpx>=0.27,<1.0",
    "uuid7>=0.1.0",
    "anyio>=4.0.0",
    "reboot==0.44.0",
]

[tool.rye]
dev-dependencies = [
    "mypy==1.18.1",
    "types-protobuf>=4.24.0.20240129",
    "reboot==0.44.0",
]

# This project only uses `rye` to provide `python` and its dependencies.
virtual = true
managed = true

[tool.uv.sources]
